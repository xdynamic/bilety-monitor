name: Monitor Bilety Tajlandia

on:
  schedule:
    - cron: '*/15 * * * *'   # co 15 minut
    - cron: '0 6 * * *'       # codziennie o 8:00 PL (UTC+2)
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Typ uruchomienia'
        required: false
        default: 'check'
        type: choice
        options:
          - check
          - summary

jobs:
  check-flights:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj zależności
        run: pip install requests

      - name: Sprawdź bilety
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          RUN_TYPE: ${{ github.event.inputs.run_type || (github.event.schedule == '0 6 * * *' && 'summary' || 'check') }}
        run: python monitor.py

      - name: Zapisz stan do repozytorium
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update state [skip ci]"
          git push
